[versions]
indra       = "4.0.0"
annotations = "26.0.2"
jspecify    = "1.0.0"

[libraries]
annotations = { group = "org.jetbrains", name = "annotations", version.ref = "annotations" }
jspecify    = { group = "org.jspecify",  name = "jspecify",    version.ref = "jspecify"    }

[plugins]
gradle-publish      = { id = "com.gradle.plugin-publish", version = "1.3.1" }
indra-base          = { id = "net.kyori.indra",                          version.ref = "indra" }
indra-licenser      = { id = "net.kyori.indra.licenser.spotless",        version.ref = "indra" }
indra-publishing    = { id = "net.kyori.indra.publishing",               version.ref = "indra" }
indra-sonatype      = { id = "net.kyori.indra.publishing.sonatype",      version.ref = "indra" }
indra-gradle-plugin = { id = "net.kyori.indra.publishing.gradle-plugin", version.ref = "indra" }
